<!doctype html>
<html lang="be">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#140a1e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Apply the saved/time-based theme before first paint so the status bar and
         page background never flash the wrong color. Mirrors initialTheme() in
         src/theme/ThemeContext.tsx; ThemeProvider re-applies the same value. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('makeup.theme')
          var hour = new Date().getHours()
          var theme =
            saved === 'day' || saved === 'night'
              ? saved
              : hour >= 7 && hour < 21
                ? 'day'
                : 'night'
          document.documentElement.dataset.theme = theme
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', theme === 'day' ? '#faf4e8' : '#140a1e')
        } catch (e) {}
      })()
    </script>
    <title>Купалле — макіяж</title>

    <!-- ── SEO ─────────────────────────────────────────────────────────────── -->
    <meta
      name="description"
      content="Абяры свой макіяж на ноч Купалля — лініі, стразы, пэрлы, кветкі. Прагартай вобразы і пакажы абраны майстру."
    />
    <meta name="author" content="neurokitsune" />
    <!-- "Varushniak" (the event) lives here only — kept out of the title/description by request. -->

    />
    <link rel="canonical" href="https://neurokitsune.github.io/makeup/" />
